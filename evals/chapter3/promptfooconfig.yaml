prompts:
  - "System: You are a strict auditor. Summarize the following financial scenario in 20 words or less. Scenario: {{scenario}}"
  - "System: You are a helpful financial consultant. Explain the financial health of the following project in detail. Scenario: {{scenario}}"

providers:
  - id: ollama:chat:llama3.2
    config:
      temperature: 0.1

tests:
  - vars:
      scenario: "A project started with 100,000 USD and ended with 145,000 USD after 12 months."
    assert:
      - type: contains
        value: "ROI"
      - type: javascript
        value: output.length > 10

  - vars:
      scenario: "A startup spent 500,000 USD and made 0 USD revenue."
    assert:
      - type: contains-any
        value: ["failure", "concern", "risk"]
