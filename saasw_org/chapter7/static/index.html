<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaSw Sovereign Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Sovereign AI OS
                </h1>
                <p class="text-slate-400">Autonomous Infrastructure Command Center</p>
            </div>
            <div id="status-badge" class="glass px-4 py-2 rounded-full flex items-center gap-3">
                <div class="w-3 h-3 bg-emerald-500 rounded-full status-pulse"></div>
                <span class="text-sm font-semibold text-emerald-400 uppercase tracking-widest">Mesh Online</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Left Column: Node Stats -->
            <div class="space-y-8">
                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-lg font-semibold mb-4 text-blue-300 uppercase text-xs tracking-wider">Active Nodes</h2>
                    <ul id="node-list" class="space-y-3">
                        <li class="flex items-center gap-2 text-slate-300">
                            <div class="w-1 h-1 bg-blue-400 rounded-full"></div>
                            Loading Nodes...
                        </li>
                    </ul>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-lg font-semibold mb-4 text-emerald-300 uppercase text-xs tracking-wider">Global Tool Catalog</h2>
                    <div id="tool-tags" class="flex flex-wrap gap-2">
                        <span class="bg-slate-800 px-3 py-1 rounded-md text-xs text-slate-400">Initializing...</span>
                    </div>
                </div>
            </div>

            <!-- Middle/Right: Agent Chat -->
            <div class="md:col-span-2 glass rounded-2xl flex flex-col h-[600px] overflow-hidden border-blue-500/20 shadow-2xl shadow-blue-500/10">
                <div class="p-4 border-b border-white/10 bg-white/5">
                    <span class="text-sm font-semibold">Master Orchestrator Interface</span>
                </div>
                
                <div id="chat-window" class="flex-1 p-6 overflow-y-auto space-y-4">
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5 max-w-[80%]">
                        <p class="text-sm">Welcome, Commander. The mesh is active. How would you like to interact with your organization today?</p>
                    </div>
                </div>

                <div class="p-4 bg-slate-900/50 border-t border-white/10">
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="Type a command (e.g. 'Market sentiment for AI')..." 
                            class="flex-1 bg-slate-800 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                        <button onclick="sendQuery()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold transition-all shadow-lg shadow-blue-600/20">
                            Execute
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('http://localhost:8000/status');
                const data = await res.json();
                
                // Update Node List
                const nodeList = document.getElementById('node-list');
                nodeList.innerHTML = data.nodes.map(node => `
                    <li class="flex justify-between items-center bg-white/5 p-3 rounded-lg border border-white/5">
                        <span class="text-sm">${node}</span>
                        <span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded italic uppercase">Active</span>
                    </li>
                `).join('');

                // Update Tool Tags
                const toolTags = document.getElementById('tool-tags');
                toolTags.innerHTML = data.tools.map(tool => `
                    <span class="bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-md text-xs text-blue-300 font-medium">${tool}</span>
                `).join('');

            } catch (e) {
                console.error("Dashboard failed to fetch status", e);
            }
        }

        async function sendQuery() {
            const input = document.getElementById('chat-input');
            const chatWindow = document.getElementById('chat-window');
            const query = input.value;
            if(!query) return;

            // Add user message
            chatWindow.innerHTML += `
                <div class="ml-auto bg-blue-600 p-4 rounded-xl max-w-[80%] text-sm">
                    <p>${query}</p>
                </div>
            `;
            input.value = '';

            try {
                const res = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query})
                });
                const data = await res.json();
                
                // Add Agent response
                chatWindow.innerHTML += `
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5 max-w-[80%]">
                        <p class="text-sm font-mono text-emerald-400 mb-2">> NODE_RESPONSE_RECEIVED</p>
                        <p class="text-sm">${data.answer}</p>
                    </div>
                `;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (e) {
                chatWindow.innerHTML += `<p class="text-red-400 text-xs mt-2">Error connecting to mesh.</p>`;
            }
        }

        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
